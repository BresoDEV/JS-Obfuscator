<style>

    * {

    body {

        background-color: #121212;
        color: #f1f1f1;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        width: 100%;
        max-width: 900px;
        padding: 20px;
    }

    .header {
        text-align: center;
        margin-bottom: 40px;
    }

    .header h1 {
        font-size: 2.5rem;
        color: #f1f1f1;
    }

    .header p {
        font-size: 1.2rem;
        color: #b0b0b0;
    }

    .form-section,
    .result-section {
        margin-bottom: 40px;
    }

    h2 {
        font-size: 1.8rem;
        margin-bottom: 20px;
        color: #f1f1f1;
    }

    .music-form {
        display: flex;
        flex-direction: column;
    }

    label {
        font-size: 1rem;
        margin-bottom: 8px;
        color: #e0e0e0;
    }


    img {
        width: 70%;
    }

    textarea,
    input {
        padding: 12px;
        margin-bottom: 20px;
        border: 1px solid #444;
        background-color: #222;
        color: #f1f1f1;
        font-size: 1rem;
        border-radius: 5px;
        resize: none;
    }

    button {
        padding: 15px;
        font-size: 1.1rem;
        background-color: #6200ea;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s ease;
    }

    button:hover {
        background-color: #3700b3;
    }

    .art-placeholder,
    .lyrics-placeholder {
        background-color: #333;
        padding: 20px;
        border-radius: 5px;
        text-align: center;
        color: #b0b0b0;
    }

    @media (max-width: 768px) {
        .container {
            padding: 15px;
        }

        .header h1 {
            font-size: 2rem;
        }

        h2 {
            font-size: 1.5rem;
        }

        button {
            font-size: 1rem;
        }
    }
</style>
